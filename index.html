<body>
  <div class="container">
    <img src="https://github.com/YU-CHEN-YEH-Franky.png" alt="avatar" width="180" style="border-radius:50%; margin-bottom:1.5rem;">
    <h1>YU CHEN YEH - Franky</h1>
    <p style="color:#c0c0c0; font-size:1.1rem; margin-bottom:1.5rem;">I love building things that make people smile. 🌍</p>

    <p style="color:#a0a0a0; font-size:1rem; margin-bottom:1.5rem;">
      <i class="fa-solid fa-envelope" style="margin-right:0.4rem;"></i>
      <span id="email-text">franky.2.0808@gmail.com</span>
      <button class="copy-btn" onclick="copyEmail()"><i class="fa-regular fa-copy"></i> Copy</button>
    </p>

    <div class="links">
      <a href="https://apps.apple.com/developer/yu-chen-yeh/id1674576975" class="btn" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-apple"></i> My Apps on App Store</a>

    </div>

  </div>
  <script>
    function copyEmail() {
      const email = document.getElementById('email-text').textContent;
      navigator.clipboard.writeText(email).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
        setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy'; }, 2000);
      });
    }
  </script>
