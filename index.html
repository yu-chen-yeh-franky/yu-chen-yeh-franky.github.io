<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- PNG 格式 (建議加入) -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <title>YU CHEN YEH - Franky</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    html { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    body { font-family: system-ui, sans-serif; margin:0; padding:0; background:#0f0f0f; color:#e0e0e0; min-height: 100%; overflow-x: hidden; position: relative; }
    .container { max-width:800px; margin:0 auto; padding:4rem 1rem; text-align:center; }
    h1 { font-size:3.5rem; margin-bottom:0.5rem; }
    .tagline { font-size:1.4rem; color:#a0a0a0; margin-bottom:2rem; }
    .links { display:flex; flex-wrap:wrap; justify-content:center; gap:1.5rem; margin:2rem 0; }
    .btn { background:#333; color:white; padding:1rem 2rem; border-radius:50px; text-decoration:none; font-weight:bold; transition:0.3s; }
    .btn:hover { background:#555; transform:translateY(-3px); }
    .social { font-size:2rem; margin:0 1rem; color:#888; text-decoration:none; }
    .social:hover { color:white; }
    .copy-btn { background:#333; border:none; color:#aaa; padding:0.3rem 0.7rem; border-radius:6px; cursor:pointer; font-size:0.85rem; margin-left:0.5rem; transition:0.2s; }
    .copy-btn:hover { background:#555; color:white; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://github.com/YU-CHEN-YEH-Franky.png" alt="頭像" width="180" style="border-radius:50%; margin-bottom:1.5rem;">
    <h1>YU CHEN YEH - Franky</h1>
    <p style="color:#c0c0c0; font-size:1.1rem; margin-bottom:1.5rem;">Hi there! I love building things that make the planet smile. 🌍</p>

    <p style="color:#a0a0a0; font-size:1rem; margin-bottom:1.5rem;">
      <i class="fa-solid fa-envelope" style="margin-right:0.4rem;"></i>
      <span id="email-text">franky.2.0808@gmail.com</span>
      <button class="copy-btn" onclick="copyEmail()"><i class="fa-regular fa-copy"></i> Copy</button>
    </p>

    <div class="links">
      <a href="https://apps.apple.com/developer/yu-chen-yeh/id1674576975" class="btn" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-apple"></i> My Apps on App Store</a>
      <a href="https://play.google.com/store/apps/developer?id=YU+CHEN+YEH+Apps" class="btn" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-google-play"></i> My Apps on Google Play</a>
      <a href="https://www.printables.com/@YUCHENYEHFra_4574192" class="btn" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-cube"></i> My 3D Models</a>
      <a href="https://www.youtube.com/channel/UCaZsGCzu3SZpq3bUerm9DZA" class="btn" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-youtube"></i> YouTube</a>
      <a href="https://github.com/yu-chen-yeh-franky" class="btn" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-github"></i> GitHub</a>
    </div>
  </div>
  <script>
    function copyEmail() {
      const email = document.getElementById('email-text').textContent;
      navigator.clipboard.writeText(email).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
        setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy'; }, 2000);
      });
    }
  </script>
</body>
</html>
